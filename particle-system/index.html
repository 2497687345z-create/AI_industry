// ==================== LOTUS AUDIO SYSTEM ====================
function initLotusAudio() {
  if (lotusAudioInitialized) return;
  try {
    lotusAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    lotusAudioInitialized = true;
  } catch (e) {
    console.warn('Web Audio not available');
  }
}

function startChargeSound() {
  if (!lotusAudioCtx) return;
  stopChargeSound();
  lotusChargeOsc = lotusAudioCtx.createOscillator();
  lotusChargeGain = lotusAudioCtx.createGain();
  lotusChargeOsc.type = 'sine';
  lotusChargeOsc.frequency.value = 35;
  lotusChargeGain.gain.value = 0;
  lotusChargeOsc.connect(lotusChargeGain);
  lotusChargeGain.connect(lotusAudioCtx.destination);
  lotusChargeOsc.start();
  lotusChargeSound = { osc: lotusChargeOsc, gain: lotusChargeGain };
}

function updateChargeSound(level) {
  if (!lotusChargeSound) return;
  lotusChargeSound.osc.frequency.value = 35 + level * 120;
  lotusChargeSound.gain.gain.value = Math.min(level * 0.25, 0.25);
}

function stopChargeSound() {
  if (lotusChargeSound) {
    try { lotusChargeSound.osc.stop(); } catch (e) {}
    lotusChargeSound = null;
  }
}

function playReleaseSound() {
  if (!lotusAudioCtx) return;

  // Beat 1: Deep boom (low freq burst)
  const t0 = lotusAudioCtx.currentTime;
  const boom = lotusAudioCtx.createOscillator();
  const boomGain = lotusAudioCtx.createGain();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(80, t0);
  boom.frequency.exponentialRampToValueAtTime(18, t0 + 0.35);
  boomGain.gain.setValueAtTime(0.5, t0);
  boomGain.gain.exponentialRampToValueAtTime(0.01, t0 + 0.5);
  boom.connect(boomGain).connect(lotusAudioCtx.destination);
  boom.start(t0);
  boom.stop(t0 + 0.5);

  // Beat 2: Rising whistle (sweep up)
  const sweep = lotusAudioCtx.createOscillator();
  const sweepGain = lotusAudioCtx.createGain();
  sweep.type = 'sawtooth';
  sweep.frequency.setValueAtTime(120, t0 + 0.15);
  sweep.frequency.exponentialRampToValueAtTime(800, t0 + 0.6);
  sweepGain.gain.setValueAtTime(0.08, t0 + 0.15);
  sweepGain.gain.linearRampToValueAtTime(0.15, t0 + 0.5);
  sweepGain.gain.exponentialRampToValueAtTime(0.01, t0 + 0.7);
  sweep.connect(sweepGain).connect(lotusAudioCtx.destination);
  sweep.start(t0 + 0.15);
  sweep.stop(t0 + 0.7);

  // Beat 3: Explosion crack (noise burst)
  const bufferSize = lotusAudioCtx.sampleRate * 0.6;
  const noiseBuffer = lotusAudioCtx.createBuffer(1, bufferSize, lotusAudioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    const t = i / lotusAudioCtx.sampleRate;
    data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 8);
  }
  const noise = lotusAudioCtx.createBufferSource();
  const noiseGain = lotusAudioCtx.createGain();
  noise.buffer = noiseBuffer;
  noiseGain.gain.setValueAtTime(0.35, t0 + 0.4);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, t0 + 1.0);
  const noiseFilter = lotusAudioCtx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.setValueAtTime(300, t0 + 0.4);
  noiseFilter.frequency.exponentialRampToValueAtTime(50, t0 + 1.0);
  noise.connect(noiseFilter).connect(noiseGain).connect(lotusAudioCtx.destination);
  noise.start(t0 + 0.4);
  noise.stop(t0 + 1.2);
}

// ==================== SHATTER SCREEN EFFECT (ENHANCED FREEZE/HEAL) ====================
function initShatter() {
    const el = document.getElementById('shatter-canvas');
    if (!el) return;
    el.width = window.innerWidth;
    el.height = window.innerHeight;
    shatterCanvasEl = el;
    shatterCtx = el.getContext('2d');
    shatterCracks = [];
    shatterFragments = [];
    shatterTime = 0;
    shatterActive = true;
    el.classList.add('active');

    // Also init glow canvas
    const glowEl = document.getElementById('crack-glow-canvas');
    if (glowEl) { glowEl.width = el.width; glowEl.height = el.height; }

    const cx = el.width / 2;
    const cy = el.height / 2;
    const maxDim = Math.max(el.width, el.height);

    // More main cracks (8-14)
    const numMainCracks = 8 + Math.floor(Math.random() * 7);
    for (let i = 0; i < numMainCracks; i++) {
        const angle = (Math.PI * 2 / numMainCracks) * i + (Math.random() - 0.5) * 0.3;
        const length = maxDim * (0.55 + Math.random() * 0.45);
        generateCrack(cx, cy, angle, length, 0);
    }

    // Secondary cracks from random points
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = maxDim * (0.08 + Math.random() * 0.25);
        const sx = cx + Math.cos(angle) * dist;
        const sy = cy + Math.sin(angle) * dist;
        generateCrack(sx, sy, angle + (Math.random() - 0.5) * 0.6, maxDim * (0.35 + Math.random() * 0.35), 1);
    }

    // Glass fragments
    const numFragments = 120 + Math.floor(Math.random() * 80);
    for (let i = 0; i < numFragments; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * maxDim * 0.55;
        const size = 12 + Math.random() * 65;
        const numVerts = 3 + Math.floor(Math.random() * 4);
        const verts = [];
        for (let j = 0; j < numVerts; j++) {
            const a = (Math.PI * 2 / numVerts) * j + (Math.random() - 0.5) * 0.5;
            const r = size * (0.35 + Math.random() * 0.65);
            verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
        // Store initial position for heal
        const initX = cx + Math.cos(angle) * dist * 0.3;
        const initY = cy + Math.sin(angle) * dist * 0.3;
        shatterFragments.push({
            x: initX, y: initY,
            initX, initY,
            vx: (Math.random() - 0.5) * maxDim * 0.55,
            vy: (Math.random() - 0.5) * maxDim * 0.55 - Math.random() * 180,
            size: size,
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 5,
            opacity: 0.5 + Math.random() * 0.5,
            delay: Math.random() * 0.35,
            vertices: verts,
            crackGlow: Math.random() < 0.3,
        });
    }

    // Body camera shake
    document.body.classList.add('camera-shake');
}

function generateCrack(x1, y1, angle, length, depth) {
    if (depth > SHATTER_MAX_DEPTH || length < 6) return;

    const endX = x1 + Math.cos(angle) * length;
    const endY = y1 + Math.sin(angle) * length;

    shatterCracks.push({
        x1, y1, x2: endX, y2: endY,
        initX1: x1, initY1: y1, initX2: endX, initY2: endY,
        depth,
        maxTravel: length,
        width: Math.max(0.6, 5 - depth * 0.8),
        glow: depth <= 2,
        progress: 0,
        sparkTimer: 0,
    });

    const numBranches = depth === 0 ? (2 + Math.floor(Math.random() * 3)) : (Math.random() < 0.45 ? 1 + Math.floor(Math.random() * 2) : 0);
    for (let i = 0; i < numBranches; i++) {
        const branchFrac = 0.22 + Math.random() * 0.55;
        const branchAngle = angle + (Math.random() - 0.5) * (Math.PI / 2.0);
        const branchLength = length * (0.28 + Math.random() * 0.38);
        const bx = x1 + Math.cos(angle) * length * branchFrac;
        const by = y1 + Math.sin(angle) * length * branchFrac;
        generateCrack(bx, by, branchAngle, branchLength, depth + 1);
    }
}

function updateShatter(dt, isFreeze, isHeal) {
    if (!shatterActive || !shatterCtx) return;

    if (isFreeze) {
        // FREEZE: hold cracks at full spread, fragments still slowly drift
        const el = shatterCanvasEl;
        const ctx = shatterCtx;
        ctx.clearRect(0, 0, el.width, el.height);
        drawCracks(ctx, el, 1.0, 1.0);
        drawFragments(ctx, dt, 0.02, false);
        drawSparkParticles(ctx, 1.0, 0.4);

        // Draw glow on separate canvas
        drawCrackGlow(1.0);
        return;
    }

    if (isHeal) {
        // HEAL: cracks reverse, fragments return to origin
        shatterTime = Math.max(0, shatterTime - dt * 1.6);
        const healProgress = 1 - Math.min(shatterTime / 1.8, 1);

        const el = shatterCanvasEl;
        const ctx = shatterCtx;
        ctx.clearRect(0, 0, el.width, el.height);

        const crackProgress = Math.min(shatterTime / 1.8, 1);
        const easedP = 1 - Math.pow(1 - crackProgress, 2.5);
        drawCracks(ctx, el, easedP, 1 - healProgress);
        drawFragments(ctx, dt, 0.03, true);
        drawSparkParticles(ctx, easedP, 0.15);

        drawCrackGlow(easedP);

        // When fully healed
        if (shatterTime <= 0) {
            endShatter();
        }
        return;
    }

    // NORMAL: cracks spreading
    shatterTime += dt;
    const el = shatterCanvasEl;
    const ctx = shatterCtx;
    ctx.clearRect(0, 0, el.width, el.height);

    const crackProgress = Math.min(shatterTime / 1.8, 1);
    const easedP = 1 - Math.pow(1 - crackProgress, 2.5);
    drawCracks(ctx, el, easedP, 0);
    drawFragments(ctx, dt, 1.0, false);
    drawSparkParticles(ctx, easedP, 0.8);

    drawCrackGlow(easedP);

    // End of spread phase
    if (shatterTime > 2.2) {
        shatterActive = false;
        endShatter();
    }
}

function drawCracks(ctx, el, easedP, healAlpha) {
    const w = el.width, h = el.height;
    for (const crack of shatterCracks) {
        const depthDelay = crack.depth * 0.05;
        const crackP = Math.max(0, Math.min(1, (easedP - depthDelay) / (1 - depthDelay)));
        if (crackP <= 0) continue;

        const dx = crack.x2 - crack.x1;
        const dy = crack.y2 - crack.y1;
        const fullLen = Math.sqrt(dx * dx + dy * dy);
        const clampedLen = Math.min(crack.maxTravel * crackP, fullLen);
        const ratio = fullLen > 0 ? clampedLen / fullLen : 0;
        const ex = crack.x1 + dx * ratio;
        const ey = crack.y1 + dy * ratio;

        const baseAlpha = Math.max(0, (1 - crackP * 0.4) - healAlpha);

        // Outer glow
        if (crack.glow && crackP > 0.03 && baseAlpha > 0.05) {
            ctx.save();
            ctx.beginPath(); ctx.moveTo(crack.x1, crack.y1); ctx.lineTo(ex, ey);
            ctx.lineWidth = crack.width + 6;
            ctx.strokeStyle = `rgba(255, 40, 5, ${0.4 * baseAlpha})`;
            ctx.shadowColor = 'rgba(255, 20, 0, 0.7)'; ctx.shadowBlur = 12 + crack.width * 2;
            ctx.stroke(); ctx.restore();
        }

        // Bright inner line
        ctx.save();
        ctx.beginPath(); ctx.moveTo(crack.x1, crack.y1); ctx.lineTo(ex, ey);
        ctx.lineWidth = crack.width * 0.4;
        ctx.strokeStyle = `rgba(255, 180, 120, ${0.8 * baseAlpha})`;
        ctx.shadowColor = 'rgba(255, 100, 40, 0.5)'; ctx.shadowBlur = 3;
        ctx.stroke(); ctx.restore();

        // Dark core
        ctx.save();
        ctx.beginPath(); ctx.moveTo(crack.x1, crack.y1); ctx.lineTo(ex, ey);
        ctx.lineWidth = crack.width;
        ctx.strokeStyle = `rgba(5, 1, 3, ${0.9 * baseAlpha})`;
        ctx.stroke(); ctx.restore();
    }
}

function drawFragments(ctx, dt, mult, returning) {
    for (const frag of shatterFragments) {
        if (shatterTime < frag.delay && !returning) continue;
        const age = returning ? Math.max(0, 1 - shatterTime / 1.8) : Math.min((shatterTime - frag.delay) / 2.0, 1);
        const alpha = frag.opacity * (1 - age * (returning ? 0.5 : 0.85));
        if (alpha <= 0.01) continue;

        if (returning) {
            // Return to origin
            frag.x += (frag.initX - frag.x) * 0.08;
            frag.y += (frag.initY - frag.y) * 0.08;
            frag.rot += (0 - frag.rot) * 0.06;
        } else {
            frag.x += frag.vx * dt * mult;
            frag.y += frag.vy * dt * mult;
            frag.vy += 60 * dt;
            frag.rot += frag.rotV * dt * mult;
        }

        ctx.save();
        ctx.translate(frag.x, frag.y);
        ctx.rotate(frag.rot);
        const v = frag.vertices;
        if (v.length > 0) {
            ctx.beginPath();
            ctx.moveTo(v[0].x, v[0].y);
            for (let j = 1; j < v.length; j++) ctx.lineTo(v[j].x, v[j].y);
            ctx.closePath();
            ctx.fillStyle = `rgba(6, 2, 4, ${alpha * 0.7})`; ctx.fill();
            ctx.strokeStyle = `rgba(180, 20, 15, ${alpha * 0.8})`; ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(200, 15, 8, 0.6)'; ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.strokeStyle = `rgba(255, 100, 40, ${alpha * 0.5})`; ctx.lineWidth = 0.7; ctx.shadowBlur = 4;
            ctx.stroke();
        }
        ctx.restore();
    }
}

function drawSparkParticles(ctx, easedP, mult) {
    if (shatterTime > 3.5) return;
    const numSparks = Math.floor(6 * mult);
    for (let i = 0; i < numSparks; i++) {
        const crack = shatterCracks[Math.floor(Math.random() * shatterCracks.length)];
        const depthDelay = crack.depth * 0.05;
        const crackP = Math.max(0, Math.min(1, (easedP - depthDelay) / (1 - depthDelay)));
        if (crackP <= 0.03) continue;
        const dx = crack.x2 - crack.x1, dy = crack.y2 - crack.y1;
        const fullLen = Math.sqrt(dx*dx+dy*dy);
        const clampedLen = Math.min(crack.maxTravel * crackP, fullLen);
        const ratio = fullLen > 0 ? clampedLen / fullLen : 0;
        const ex = crack.x1 + dx * ratio, ey = crack.y1 + dy * ratio;
        ctx.beginPath();
        ctx.arc(ex + (Math.random()-0.5)*14, ey + (Math.random()-0.5)*14, 1.2+Math.random()*3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,${160+Math.random()*95},${Math.random()*50},${0.85*mult})`;
        ctx.fill();
    }
}

function drawCrackGlow(easedP) {
    const glowEl = document.getElementById('crack-glow-canvas');
    if (!glowEl) return;
    const ctx = glowEl.getContext('2d');
    const w = glowEl.width, h = glowEl.height;
    ctx.clearRect(0, 0, w, h);

    // Draw soft radial glow at crack tips
    for (const crack of shatterCracks) {
        if (!crack.glow) continue;
        const depthDelay = crack.depth * 0.05;
        const crackP = Math.max(0, Math.min(1, (easedP - depthDelay) / (1 - depthDelay)));
        if (crackP <= 0.05) continue;
        const dx = crack.x2 - crack.x1, dy = crack.y2 - crack.y1;
        const fullLen = Math.sqrt(dx*dx+dy*dy);
        const clampedLen = Math.min(crack.maxTravel * crackP, fullLen);
        const ratio = fullLen > 0 ? clampedLen / fullLen : 0;
        const ex = crack.x1 + dx * ratio, ey = crack.y1 + dy * ratio;

        const grad = ctx.createRadialGradient(ex, ey, 0, ex, ey, 40 + crack.width * 8);
        grad.addColorStop(0, 'rgba(255, 80, 20, 0.5)');
        grad.addColorStop(0.3, 'rgba(200, 30, 60, 0.3)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(ex - 50, ey - 50, 100, 100);
    }
    glowEl.classList.toggle('active', easedP > 0.03);
}

function endShatter() {
    shatterActive = false;
    const el = document.getElementById('shatter-canvas');
    if (el) { el.classList.remove('active','healing'); const ctx = el.getContext('2d'); ctx.clearRect(0,0,el.width,el.height); }
    const glowEl = document.getElementById('crack-glow-canvas');
    if (glowEl) { glowEl.classList.remove('active'); const ctx = glowEl.getContext('2d'); ctx.clearRect(0,0,glowEl.width,glowEl.height); }
    document.body.classList.remove('camera-shake');
    shatterCracks = [];
    shatterFragments = [];
    shatterTime = 0;
}

// Handle canvas resize for all overlays
window.addEventListener('resize', () => {
    const glowEl = document.getElementById('crack-glow-canvas');
    const hwEl = document.getElementById('heatwave-canvas');
    if (shatterCanvasEl) { shatterCanvasEl.width = window.innerWidth; shatterCanvasEl.height = window.innerHeight; }
    if (glowEl) { glowEl.width = window.innerWidth; glowEl.height = window.innerHeight; }
    if (hwEl) { hwEl.width = window.innerWidth; hwEl.height = window.innerHeight; }
});



// ==================== ANIMATION LOOP ====================
const clock = new THREE.Clock();

function animate(timestamp) {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const isLotus = currentModel === 'xiao-yan-lotus';
  const isMok = currentModel === 'mok';

  // Smooth gesture values with lerp
  const smoothing = 1 - Math.exp(-8 * dt);
  smoothScale += (targetScale - smoothScale) * smoothing;
  smoothDiffusion += (targetDiffusion - smoothDiffusion) * smoothing;

  // Smooth hand position for lotus rotation
  if (isLotus) {
    handSmoothedX += (singleHandX - handSmoothedX) * smoothing;
    handSmoothedY += (singleHandY - handSmoothedY) * smoothing;
  }

  // Advance model transition
  if (modelTransition < 1) {
    modelTransition += dt * 2.5;
  }

  // Model-specific animation
  if (isMok) {
    // Mok physics simulation
    updateMokPhysics(dt, latestHandResults);

    // Mok-specific rotation: auto-rotate gently, hand overrides
    if (handsDetected >= 1 && latestHandResults && latestHandResults.multiHandLandmarks.length > 0) {
      const wrist = latestHandResults.multiHandLandmarks[0][0];
      const targetRY = (wrist.x - 0.5) * Math.PI * 1.2;
      const targetRX = (wrist.y - 0.5) * 0.8;
      mokPoints.rotation.y += (targetRY - mokPoints.rotation.y) * smoothing * 1.2;
      mokPoints.rotation.x += (targetRX - mokPoints.rotation.x) * smoothing * 1.2;
    } else {
      mokPoints.rotation.y += dt * 0.2;
    }
  } else if (isLotus) {
    lotusTime += dt;

    // Lotus breathing float + auto rotation
    lotusBreathPhase += dt * 0.55;
    const breathY = Math.sin(lotusBreathPhase) * 0.35;
    const breathScale = 1 + Math.sin(lotusBreathPhase * 0.75) * 0.04;
    lotusFloatY += (breathY - lotusFloatY) * 0.04;

    // Handle transition from previous model
    if (modelTransition < 1 && oldBasePositions) {
      modelTransition += dt * 2.5;
      updateAllParticles(1.0, 0);
    } else {
      modelTransition = 1;

      // ===== CHARGE/RELEASE/FREEZE/HEAL STATE MACHINE =====
      const isHandClosed = handsDetected >= 1 && smoothDiffusion < 0.12;

      if (lotusChargeState === 'idle') {
        lotusChargeLevel = 0; lotusChargeTime = 0;
        lotusIllusionFadeTarget = 1; lotusIllusionFade = 1; // Reset illusion
        if (isHandClosed) {
          lotusChargeState = 'charging';
          lotusIllusionFadeTarget = 1.5; // Boost illusion density
          initLotusAudio(); startChargeSound();
        }
      } else if (lotusChargeState === 'charging') {
        if (isHandClosed) {
          lotusChargeTime += dt;
          lotusChargeLevel = Math.min(1, lotusChargeTime / 2.5);
          updateChargeSound(lotusChargeLevel);
        } else if (lotusChargeLevel > 0.15) {
          // RELEASE! Trigger shatter
          lotusChargeState = 'release';
          lotusReleaseTime = 0;
          stopChargeSound(); playReleaseSound();
          lotusShockwaveActive = true;
          lotusFlashAlpha = 1.0;
          lotusHeatWaveTime = 0.8;
          if (navigator.vibrate) navigator.vibrate([50, 30, 50, 30, 100]);
          initShatter();
        } else { lotusChargeState = 'idle'; lotusChargeLevel = 0;
          lotusIllusionFadeTarget = 1; lotusIllusionFade = 1; stopChargeSound(); }
      } else if (lotusChargeState === 'release') {
        lotusReleaseTime += dt;
        updateShatter(dt, false, false);
        lotusChargeLevel = Math.max(0, 1 - lotusReleaseTime / lotusReleaseDuration);
        lotusFlashAlpha = Math.max(0, lotusFlashAlpha - dt * 3.5);
        lotusHeatWaveTime = Math.max(0, lotusHeatWaveTime - dt);
        // After release spread (~0.5s), enter freeze
        if (lotusReleaseTime > 0.5) {
          lotusChargeState = 'freeze';
          lotusFreezeTime = 0;
        }
      } else if (lotusChargeState === 'freeze') {
        lotusFreezeTime += dt;
        updateShatter(dt, true, false);
        lotusChargeLevel = Math.max(0, lotusChargeLevel - dt * 0.3);
        lotusFlashAlpha = Math.max(0, lotusFlashAlpha - dt * 2);
        lotusHeatWaveTime = Math.max(0, lotusHeatWaveTime - dt);
        // Hold for 0.8s
        if (lotusFreezeTime >= LOTUS_FREEZE_DURATION) {
          lotusChargeState = 'heal';
          lotusHealTime = 0;
          // Fire heal ring
          const healRing = document.getElementById('heal-ring');
          if (healRing) { healRing.classList.remove('contracting'); void healRing.offsetWidth; healRing.classList.add('contracting'); }
        }
      } else if (lotusChargeState === 'heal') {
        lotusHealTime += dt;
        updateShatter(dt, false, true);
        lotusChargeLevel = Math.max(0, lotusChargeLevel - dt * 0.5);
        lotusFlashAlpha = 0;
        lotusHeatWaveTime = 0;
        if (lotusHealTime >= LOTUS_HEAL_DURATION) {
          lotusChargeState = 'cooldown';
          lotusShockwaveActive = false;
          lotusIllusionFadeTarget = 0; // Trigger 1.2s dissolve
          endShatter();
        }
      } else if (lotusChargeState === 'cooldown') {
        lotusChargeLevel = Math.max(0, lotusChargeLevel - dt * 0.6);
        if (lotusChargeLevel <= 0.01 && !isHandClosed) {
          lotusChargeState = 'idle'; lotusChargeLevel = 0;
        }
      }

      // ===== CAMERA ZOOM =====
      if (lotusChargeState === 'charging') {
        lotusTargetZoom = 8 - lotusChargeLevel * 4.5;
      } else if (lotusChargeState === 'release' && lotusReleaseTime < 0.3) {
        lotusTargetZoom = 15;
      } else if (lotusChargeState === 'freeze') {
        lotusTargetZoom = 13;
      } else if (lotusChargeState === 'heal') {
        lotusTargetZoom = 8 + (1 - lotusHealTime / LOTUS_HEAL_DURATION) * 5;
      } else {
        lotusTargetZoom = 8;
      }
      lotusCurrentZoom += (lotusTargetZoom - lotusCurrentZoom) * (
        (lotusChargeState === 'release' && lotusReleaseTime < 0.3) ? 0.3 :
        lotusChargeState === 'freeze' ? 0.15 : 0.06
      );

      // ===== SCREEN SHAKE =====
      if (lotusChargeState === 'charging') {
        lotusShakeAmp = lotusChargeLevel * 0.12;
        if (lotusShakeAmp > 0.02) document.body.classList.add('camera-shake');
        else document.body.classList.remove('camera-shake');
      } else if (lotusChargeState === 'release') {
        const decay = Math.exp(-lotusReleaseTime * 2.2);
        lotusShakeAmp = decay * 0.9 * (0.5 + 0.5 * Math.sin(lotusReleaseTime * 28));
        if (lotusShakeAmp < 0.003) lotusShakeAmp = 0;
        if (lotusShakeAmp > 0.01) document.body.classList.add('camera-shake');
        else document.body.classList.remove('camera-shake');
      } else if (lotusChargeState === 'freeze') {
        lotusShakeAmp = 0.02 * Math.sin(lotusFreezeTime * 12) * Math.exp(-lotusFreezeTime * 1.5);
        if (lotusShakeAmp > 0.005) document.body.classList.add('camera-shake');
        else document.body.classList.remove('camera-shake');
      } else if (lotusChargeState === 'heal') {
        lotusShakeAmp += (0 - lotusShakeAmp) * 0.15;
        document.body.classList.remove('camera-shake');
      } else {
        lotusShakeAmp += (0 - lotusShakeAmp) * 0.1;
        document.body.classList.remove('camera-shake');
      }

      // ===== VIGNETTE =====
      if (lotusChargeState === 'charging') { lotusVignette = lotusChargeLevel; }
      else if (lotusChargeState === 'release') { lotusVignette = Math.max(0, 1 - lotusReleaseTime / 0.5); }
      else if (lotusChargeState === 'freeze') { lotusVignette = 0.95; }
      else if (lotusChargeState === 'heal') { lotusVignette = Math.max(0, 0.95 - lotusHealTime / LOTUS_HEAL_DURATION); }
      else { lotusVignette += (0 - lotusVignette) * 0.08; }

      // ===== SHOCKWAVE RING =====
      if (lotusShockwaveActive) {
        const ring = document.getElementById('shockwave-ring');
        if (ring) { ring.classList.remove('expanding'); void ring.offsetWidth; ring.classList.add('expanding'); setTimeout(() => ring.classList.remove('expanding'), 2200); }
        lotusShockwaveActive = false;
      }

      // ===== HEAT SHIMMER =====
      const shimmerEl = document.getElementById('heat-shimmer');
      if (shimmerEl) {
        const shouldShimmer = lotusChargeState === 'release' || lotusChargeState === 'freeze' || lotusHeatWaveTime > 0.01;
        shimmerEl.classList.toggle('active', shouldShimmer);
      }

      // ===== UPDATE OVERLAYS =====
      const vignetteEl = document.getElementById('vignette-overlay');
      const flashEl = document.getElementById('flash-overlay');
      if (vignetteEl) { vignetteEl.style.opacity = lotusVignette; vignetteEl.classList.toggle('active', lotusVignette > 0.01); }
      if (flashEl) { flashEl.style.opacity = lotusFlashAlpha; flashEl.classList.toggle('peak', lotusFlashAlpha > 0.5); }

      // ===== SCENE COLOR GRADING =====
      if (lotusChargeState === 'charging') {
        scene.fog.color.setRGB(0.03 + lotusChargeLevel * 0.12, 0.01, 0.04 + lotusChargeLevel * 0.18);
        renderer.toneMappingExposure = 1.2 + lotusChargeLevel * 0.8;
      } else if ((lotusChargeState === 'release' || lotusChargeState === 'freeze') && lotusFlashAlpha > 0.3) {
        renderer.toneMappingExposure = lotusChargeState === 'freeze' ? 3.0 : 4.0;
      } else if (lotusChargeState === 'heal') {
        renderer.toneMappingExposure += (1.2 - renderer.toneMappingExposure) * 0.08;
      } else {
        scene.fog.color.lerp(new THREE.Color(0x0a0a0f), 0.05);
        renderer.toneMappingExposure += (1.2 - renderer.toneMappingExposure) * 0.1;
      }

      // ===== HEAT WAVE CANVAS =====
      const hwCanvas = document.getElementById('heatwave-canvas');
      if (hwCanvas && (lotusHeatWaveTime > 0.001 || lotusChargeState === 'freeze')) {
        hwCanvas.width = window.innerWidth; hwCanvas.height = window.innerHeight;
        const hwCtx = hwCanvas.getContext('2d');
        hwCtx.clearRect(0, 0, hwCanvas.width, hwCanvas.height);
        const alpha = lotusChargeState === 'freeze' ? 0.35 + Math.sin(lotusFreezeTime * 8) * 0.15 : lotusHeatWaveTime * 0.5;
        // Render heat distortion as semi-transparent wavy lines
        for (let y = 0; y < hwCanvas.height; y += 8) {
          hwCtx.beginPath();
          for (let x = 0; x < hwCanvas.width; x += 4) {
            const offset = Math.sin(x * 0.03 + lotusTime * 15 + y * 0.05) * 3 + Math.sin(x * 0.07 + lotusTime * 20) * 2;
            if (x === 0) hwCtx.moveTo(x, y + offset);
            else hwCtx.lineTo(x, y + offset);
          }
          hwCtx.strokeStyle = `rgba(255,120,20,${alpha * 0.15})`;
          hwCtx.lineWidth = 1;
          hwCtx.stroke();
        }
        hwCanvas.classList.add('active');
      } else if (hwCanvas) {
        hwCanvas.classList.remove('active');
      }

      // ===== LOTUS PARTICLE BEHAVIOR =====
      if (lotusChargeState === 'charging') {
        const chargeIntensity = 0.3 + lotusChargeLevel * 1.8;
        lotusIntensity += (chargeIntensity - lotusIntensity) * smoothing;
        updateLotusParticles(lotusTime, lotusIntensity * 0.35);
        // Strong inward convergence
        const pos = geometry.attributes.position.array;
        const converge = lotusChargeLevel * 0.65;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const ix = i*3, iy = i*3+1, iz = i*3+2;
          pos[ix] *= (1 - converge * 0.018);
          pos[iy] = (pos[iy] - 0.32) * (1 - converge * 0.018) + 0.32;
          pos[iz] *= (1 - converge * 0.018);
        }
        geometry.attributes.position.needsUpdate = true;
        updateAllExternalSystems(lotusTime, lotusIntensity, lotusChargeLevel, 0);
      } else if (lotusChargeState === 'release') {
        const releaseProgress = Math.min(lotusReleaseTime / 0.5, 1);
        const explodeIntensity = (1 - releaseProgress) * 2.5 + 0.5;
        lotusIntensity += (explodeIntensity - lotusIntensity) * smoothing;
        updateLotusParticles(lotusTime, lotusIntensity * 1.3);
        // Radial explosion force (handled inside updateLotusParticles)
        updateAllExternalSystems(lotusTime, lotusIntensity, lotusChargeLevel, releaseProgress);
      } else if (lotusChargeState === 'freeze') {
        // Hold particles in exploded state
        lotusIntensity += (1.8 - lotusIntensity) * smoothing * 0.3;
        updateLotusParticles(lotusTime, lotusIntensity);
        updateAllExternalSystems(lotusTime, 1.5, 0.3, 1.0);
      } else if (lotusChargeState === 'heal') {
        const healProgress = lotusHealTime / LOTUS_HEAL_DURATION;
        lotusIntensity += ((1 - healProgress) * 1.8 - lotusIntensity) * smoothing * 0.5;
        updateLotusParticles(lotusTime, lotusIntensity);
        updateAllExternalSystems(lotusTime, Math.max(0, 1 - healProgress) * 1.5, 0, 1 - healProgress);
      } else {
        // Normal lotus animation with hand control
        if (handsDetected >= 1) {
          points.position.y = lotusFloatY;
          points.scale.setScalar(breathScale);
          const targetRotY = (handSmoothedX - 0.5) * Math.PI * 1.8;
          const targetRotX = (handSmoothedY - 0.5) * 1.6;
          points.rotation.y += (targetRotY - points.rotation.y) * smoothing * 1.5;
          points.rotation.x += (targetRotX - points.rotation.x) * smoothing * 1.5;
          const targetIntensity = 0.3 + smoothDiffusion * 2.2;
          lotusIntensity += (targetIntensity - lotusIntensity) * smoothing;
        } else {
          points.position.y = lotusFloatY;
          points.rotation.y += dt * 0.35;
          points.scale.setScalar(breathScale);
          points.rotation.x += Math.sin(lotusTime * 0.4) * dt * 0.1;
          const baseIntensity = parseFloat(intensitySlider.value);
          const breathe = baseIntensity + Math.sin(lotusTime * 0.7) * 0.35;
          lotusIntensity += (breathe - lotusIntensity) * smoothing;
        }
        updateLotusParticles(lotusTime, lotusIntensity);
        updateAllExternalSystems(lotusTime, lotusIntensity, 0, 0);
      }

      // ===== PERIODIC COLOR REFRESH =====
      const colorRefreshStates = ['idle', 'cooldown'];
      if (colorRefreshStates.includes(lotusChargeState)) {
        if (Math.floor(lotusTime * 6.5) !== Math.floor((lotusTime - dt) * 6.5)) {
          updateLotusColors(lotusIntensity);
        }
      } else if (lotusChargeState === 'charging') {
        updateLotusColors(0.3 + lotusChargeLevel * 2.5);
      } else if (lotusChargeState === 'release' || lotusChargeState === 'freeze') {
        updateLotusColors(2.5);
      } else if (lotusChargeState === 'heal') {
        updateLotusColors(2.5 * (1 - lotusHealTime / LOTUS_HEAL_DURATION));
      }

      // ===== DENSITY BADGE =====
      const densityEl = document.getElementById('lotus-density');
      if (densityEl && lotusChargeState !== 'idle' && lotusChargeState !== 'cooldown') {
        const totalParts = PARTICLE_COUNT + PARTICLE_COUNT_AURA + PARTICLE_COUNT_SPARKS + PARTICLE_COUNT_ASH + PARTICLE_COUNT_ILLUSION;
        const stateLabel = {charging:'蓄力凝聚·幻境聚拢',release:'爆裂释放·幻境炸裂',freeze:'碎屏定格·0.8s',heal:'逆向愈合·幻境消散'}[lotusChargeState]||'';
        densityEl.textContent = `🔥 ${stateLabel} · 莲体${Math.floor(PARTICLE_COUNT/1000)}K+外延幻境${Math.floor((PARTICLE_COUNT_AURA+PARTICLE_COUNT_SPARKS+PARTICLE_COUNT_ASH+PARTICLE_COUNT_ILLUSION)/1000)}K · 莲瓣200+层`;
      }
    }
  } else {
    if (currentModel === 'fireworks') {
      fireworksTime += dt;
      if (Math.floor(fireworksTime * 3) !== Math.floor((fireworksTime - dt) * 3)) {
        basePositions = generateFireworks(PARTICLE_COUNT);
        oldBasePositions = null;
        modelTransition = 1;
      }
    }

    // Standard auto rotation
    if ((autoRotate || handsDetected === 0) && !isMok) {
      points.rotation.y += dt * 0.3;
      points.rotation.x += dt * 0.08;
    }

    // Standard particle update
    if (!isMok) updateAllParticles(smoothScale, smoothDiffusion);
  }

  // Update gesture indicator
  if (isMok) {
    gestureDot.className = handsDetected > 0 ? 'active' : '';
    const windStr = mokHandVelocity > 0.3 ? ` 🌪风速:${(mokHandVelocity * 100).toFixed(0)}` : '';
    const depthStr = ` 深度:${mokDepthScale.toFixed(2)}x`;
    gestureText.textContent = handsDetected > 0
      ? `${MOK_GESTURE_ICONS[mokGesture]} ${MOK_GESTURE_LABELS[mokGesture]}${windStr}${depthStr}`
      : '未检测到手部 · 自动旋转';
    infoTip.style.opacity = '0';
  } else if (handsDetected === 0) {
    gestureDot.className = '';
    if (isLotus) {
      if (lotusChargeState === 'charging') {
        gestureText.textContent = `🔥 蓄力中 ${(lotusChargeLevel * 100).toFixed(0)}% · 粒子凝聚 · 松手爆发`;
      } else if (lotusChargeState === 'release') {
        gestureText.textContent = lotusChargeState === 'freeze' ? '💥 碎屏定格 0.8s · 幻境弥散' : lotusChargeState === 'heal' ? '🔮 碎屏愈合 · 幻境1.2s消散' : '💥 爆裂! 幻境炸裂 · 冲击波扩散';
      } else {
        gestureText.textContent = '握拳蓄力 · 凝聚火莲+幻境 · 松手爆发碎屏';
      }
      if (infoTip.style.opacity === '0') infoTip.style.opacity = '1';
    } else {
      gestureText.textContent = '未检测到手部';
      if (infoTip.style.opacity === '0') infoTip.style.opacity = '1';
    }
  } else if (handsDetected === 1) {
    gestureDot.className = 'partial';
    if (isLotus) {
      if (lotusChargeState === 'charging') {
        gestureText.textContent = `🔥 蓄力 ${(lotusChargeLevel * 100).toFixed(0)}% · 转速 ${(lotusChargeLevel * 300).toFixed(0)}°/s · 握紧蓄力`;
      } else if (lotusChargeState === 'release') {
        gestureText.textContent = `💥 火莲爆发! · 震波扩散 · 烈度MAX`;
      } else {
        gestureText.textContent = `单手掌莲 · 握拳蓄力爆发 · 旋转: ${((handSmoothedX - 0.5) * 360).toFixed(0)}°`;
      }
    } else {
      gestureText.textContent = `单手 · 扩散: ${(smoothDiffusion * 100).toFixed(0)}%`;
    }
    infoTip.style.opacity = '0';
  } else {
    gestureDot.className = 'active';
    gestureText.textContent = `双手 · 缩放: ${smoothScale.toFixed(2)}x · 扩散: ${(smoothDiffusion * 100).toFixed(0)}%`;
    infoTip.style.opacity = '0';
  }

  // Slight floating animation for stars
  stars.rotation.y += dt * 0.03;
  stars.rotation.x += dt * 0.01;

  // Camera orbit + lotus zoom/shake
  const camAngle = timestamp * 0.0001;
  if (isLotus) {
    // Lotus camera: face-on with zoom
    camera.position.x = Math.sin(camAngle) * 1.0;
    camera.position.y = 0.3;
    camera.position.z = lotusCurrentZoom;
    // Screen shake offset
    if (lotusShakeAmp > 0.001) {
      camera.position.x += (Math.random() - 0.5) * lotusShakeAmp * 2;
      camera.position.y += (Math.random() - 0.5) * lotusShakeAmp * 2;
    }
    // Heat wave distortion during release
    if (lotusHeatWaveTime > 0 && lotusChargeState === 'release') {
      const hw = lotusHeatWaveTime * 0.08;
      camera.position.x += Math.sin(timestamp * 0.04 + camAngle) * hw;
      camera.position.y += Math.cos(timestamp * 0.05 + camAngle * 1.3) * hw;
    }
    camera.lookAt(0, 0.2, 0);
  } else {
    camera.position.x = Math.sin(camAngle) * 1.5;
    camera.position.z = 8 + Math.cos(camAngle * 0.7) * 0.5;
    camera.lookAt(0, 0, 0);
  }

  // Render
  renderer.render(scene, camera);
}

// ==================== INITIALIZATION ====================
async function init() {
  // Generate initial particle positions
  setBasePositions(currentModel);
  initAllExternalSystems();
  updateParticleColors();

  // Show initial state
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positionsArr[i * 3] = basePositions[i * 3];
    positionsArr[i * 3 + 1] = basePositions[i * 3 + 1];
    positionsArr[i * 3 + 2] = basePositions[i * 3 + 2];
  }
  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;

  // Start camera
  await startCamera();

  // Hide loading
  loadingEl.classList.add('hidden');
  setTimeout(() => loadingEl.remove(), 500);

  // Start animation
  requestAnimationFrame(animate);
}

init().catch((err) => {
  console.error('Initialization error:', err);
  loadingEl.innerHTML = '<p style="color:#ff4d6a">初始化失败，请刷新页面重试</p>';
});
</script>
